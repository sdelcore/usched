name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --locked

      - name: cargo test (unit + CLI integration)
        run: cargo test --locked

  e2e:
    name: Docker systemd e2e
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Build e2e image
        run: docker build -t usched-e2e:ci -f tests/e2e/Dockerfile .

      - name: Run e2e container
        # Privileged + cgroup ns + cgroup bind mount is the canonical recipe
        # for booting systemd inside a container. The container's
        # usched-e2e.service halts the container with `systemctl exit <code>`
        # so docker run inherits the test result.
        run: |
          docker run --rm \
            --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --tmpfs /run \
            --tmpfs /run/lock \
            --tmpfs /tmp \
            usched-e2e:ci
